server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Single-page app: unknown paths fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|webp|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
